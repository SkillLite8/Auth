name: Build EndStone Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build WHL
        run: python -m build --wheel

      - name: Upload WHL
        uses: actions/upload-artifact@v4
        with:
          name: endstone-zenauth-whl
          path: dist/*.whl
          retention-days: 90
