name: Build EndStone Plugin WHL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install wheel setuptools

      - name: Create setup.py
        run: |
          # Читаем имя и версию из plugin.yml
          PLUGIN_NAME=$(grep '^name:' plugin.yml | awk '{print $2}' | tr '[:upper:]' '[:lower:]')
          PLUGIN_VERSION=$(grep '^version:' plugin.yml | awk '{print $2}')

          cat > setup.py << EOF
          from setuptools import setup, find_packages
          setup(
              name="$PLUGIN_NAME",
              version="$PLUGIN_VERSION",
              packages=find_packages(),
              package_data={"": ["plugin.yml"]},
              python_requires=">=3.11",
          )
          EOF

      - name: Build WHL
        run: python setup.py bdist_wheel

      - name: Upload WHL artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-whl
          path: dist/*.whl
          retention-days: 90
